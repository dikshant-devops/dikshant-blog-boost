<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Circle -->
  <circle cx="256" cy="256" r="256" fill="url(#gradient)" />

  <!-- Gradient Definition -->
  <defs>
    <linearGradient id="gradient" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Terminal/Code Symbol -->
  <g transform="translate(100, 140)">
    <!-- Terminal Window -->
    <rect x="0" y="0" width="312" height="232" rx="16" fill="rgba(255, 255, 255, 0.1)" stroke="rgba(255, 255, 255, 0.3)" stroke-width="3"/>

    <!-- Terminal Header Dots -->
    <circle cx="24" cy="24" r="6" fill="rgba(255, 255, 255, 0.6)"/>
    <circle cx="48" cy="24" r="6" fill="rgba(255, 255, 255, 0.6)"/>
    <circle cx="72" cy="24" r="6" fill="rgba(255, 255, 255, 0.6)"/>

    <!-- Command Prompt Symbol (>) -->
    <path d="M 40 80 L 80 110 L 40 140" stroke="white" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

    <!-- Cursor Line -->
    <rect x="95" y="105" width="60" height="8" fill="white" rx="4"/>

    <!-- Code Lines -->
    <rect x="40" y="165" width="140" height="6" fill="rgba(255, 255, 255, 0.5)" rx="3"/>
    <rect x="40" y="185" width="180" height="6" fill="rgba(255, 255, 255, 0.5)" rx="3"/>
    <rect x="40" y="205" width="120" height="6" fill="rgba(255, 255, 255, 0.5)" rx="3"/>
  </g>

  <!-- Letter "D" overlay -->
  <text x="256" y="340" font-family="Arial, sans-serif" font-size="140" font-weight="bold" fill="white" text-anchor="middle" opacity="0.9">D</text>
</svg>
